# 可选：把这个用在 Nginx 反向代理里，对 /chat 做限流（全局维度更可靠）
#
# 使用方式（示例）：
# - location /chat { include /path/to/nginx-chat-limit.conf; ... }
# 或直接把以下 server/location 片段放到你的 nginx 配置里。
#
# 说明：Nginx 只做限流；鉴权（token/白名单）仍以你的 FastAPI 代码为准。

limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=5r/m;

location /chat {
  limit_req zone=chat_limit burst=5 nodelay;
  proxy_pass http://astra-core:8000;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

