<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 对话</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="chat.css">
</head>
<body>
  <div class="app chat-app">
    <header class="header">
      <a href="/prompt.html" class="nav-link header-right">设置</a>
      <h1>AI 对话</h1>
      <p class="tagline">与 AI 自由对话</p>
    </header>

    <main class="main">
      <!-- Step 1: Wechat ID 输入 -->
      <section id="wechat-section" class="section">
        <h2>用户身份</h2>
        <form id="wechat-form" class="form">
          <div class="form-row">
            <label for="wechat-id">微信 ID / 用户标识</label>
            <input type="text" id="wechat-id" placeholder="输入你的微信 ID" autocomplete="off" required>
          </div>
          <button type="submit" class="btn btn-primary">继续</button>
        </form>
      </section>

      <!-- Step 2: 新建用户 - 出生信息 -->
      <section id="birth-section" class="section hidden">
        <h2>新建用户档案</h2>
        <p class="section-hint">未找到该用户，请填写出生信息建立档案</p>
        <p id="birth-wechat-display" class="wechat-display"></p>
        <form id="birth-form" class="form">
          <div class="form-row">
            <label for="birth-date">出生日期</label>
            <input type="date" id="birth-date" name="date" required>
          </div>
          <div class="form-row">
            <label for="birth-time">出生时间（当地时间）</label>
            <input type="time" id="birth-time" name="time" required>
          </div>
          <div class="form-row">
            <label>出生地（可选，不选则使用中国时区）</label>
            <div class="city-picker">
              <div class="city-panel city-panel-search">
                <div class="city-panel-head">
                  <span class="city-panel-mark" aria-hidden="true"></span>
                  <div class="city-panel-titles">
                    <span class="city-panel-title">搜索城市</span>
                    <span class="city-panel-desc">首选方式：在结果里点选；支持中文与拼音</span>
                  </div>
                </div>
                <div class="city-search-row">
                  <input type="text" id="place-search" placeholder="例如 北京、上海、广州…" autocomplete="off">
                  <button type="button" id="search-btn" class="btn city-search-btn">搜索</button>
                </div>
                <ul id="city-results" class="city-results hidden" role="listbox" aria-label="城市候选"></ul>
              </div>

              <p class="city-fallback-bridge">若搜索结果不符合预期，可用手动经纬度<strong>兜底</strong>：</p>

              <div class="city-panel city-panel-manual city-panel-fallback">
                <div class="city-panel-head">
                  <span class="city-panel-mark city-panel-mark--coord" aria-hidden="true"></span>
                  <div class="city-panel-titles">
                    <span class="city-panel-title">手动坐标（兜底）</span>
                    <span class="city-panel-desc">WGS84，与星历一致；搜索不到或不准时用</span>
                  </div>
                </div>
                <div class="city-coords-grid">
                  <div class="city-field">
                    <label for="manual-lat">纬度</label>
                    <input type="number" id="manual-lat" placeholder="-90 ~ 90" step="any" min="-90" max="90" autocomplete="off" inputmode="decimal">
                  </div>
                  <div class="city-field">
                    <label for="manual-lng">经度</label>
                    <input type="number" id="manual-lng" placeholder="-180 ~ 180" step="any" min="-180" max="180" autocomplete="off" inputmode="decimal">
                  </div>
                </div>
                <div class="city-field city-field-wide">
                  <label for="manual-place-name">地点备注</label>
                  <input type="text" id="manual-place-name" placeholder="可选，用于档案展示" maxlength="120" autocomplete="off">
                </div>
                <button type="button" id="manual-apply-btn" class="btn city-apply-btn">使用手动坐标</button>
              </div>

              <p id="city-hint" class="city-hint">用于匹配出生地时区：优先搜索选点；不符预期再用下方兜底。</p>
              <div id="selected-place" class="selected-place hidden">
                <span id="selected-place-text" class="selected-place-main"></span>
                <button type="button" id="clear-place" class="btn-clear">清除</button>
              </div>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">创建档案并开始对话</button>
        </form>
      </section>

      <!-- Step 3: 对话 -->
      <section id="chat-section" class="section hidden">
        <div class="chat-header-row">
          <h2>对话</h2>
          <span id="current-user" class="current-user"></span>
        </div>
        <div class="conversation-bar">
          <div class="conversation-bar-left">
            <div class="conversation-label">会话</div>
            <select id="conversation-select" class="conversation-select"></select>
          </div>
          <button type="button" id="new-conversation-btn" class="btn btn-secondary">新建会话</button>
        </div>
        <div id="chart-summary" class="chart-summary hidden"></div>
        <div id="messages" class="messages"></div>
        <form id="chat-form" class="chat-form">
          <input type="text" id="message-input" placeholder="输入消息..." autocomplete="off">
          <button type="submit" class="btn btn-primary">发送</button>
        </form>
      </section>
    </main>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span id="loading-text">加载中...</span>
    </div>
  </div>

  <script src="chat.js"></script>
</body>
</html>
