<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Prompt 设置</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .prompt-app { max-width: 720px; }
    .prompt-app .form-row { margin-bottom: 1rem; }
    .prompt-app textarea {
      width: 100%;
      min-height: 360px;
      padding: 1rem;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      line-height: 1.6;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      resize: vertical;
    }
    .prompt-app .hint { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem; }
    .prompt-app .status { font-size: 0.9rem; margin-top: 1rem; min-height: 1.5em; }
    .prompt-app .status.success { color: #2d7a3e; }
    .prompt-app .status.error { color: #c43c2e; }
  </style>
</head>
<body>
  <div class="app prompt-app">
    <header class="header">
      <a href="/" class="back-link">← 返回</a>
      <h1>System Prompt 设置</h1>
      <p class="tagline">编辑 AI 对话的系统指令，修改后立即生效</p>
    </header>

    <main class="main">
      <section class="section">
        <form id="prompt-form">
          <div class="form-row">
            <label for="prompt-content">系统指令内容</label>
            <textarea id="prompt-content" placeholder="输入 AI 的系统提示词..." autocomplete="off"></textarea>
            <p class="hint">此内容会作为 AI 的角色设定与行为准则，每次对话都会使用。</p>
          </div>
          <div class="form-row">
            <button type="submit" class="btn btn-primary">保存</button>
            <span id="status" class="status"></span>
          </div>
        </form>
      </section>
    </main>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>加载中...</span>
    </div>
  </div>

  <script src="prompt.js"></script>
</body>
</html>
