# 在「已有 Certbot HTTPS」的基础上合并限流：只改 443 的 server 里 location，
# 并确保 /etc/nginx/conf.d/00-limits.conf 已部署（见同目录 00-limits.conf）。
#
# 用法：sudo nano /etc/nginx/sites-available/你的站点文件
#      用下面第一个 server { ... } 替换你现有的 listen 443 ssl 那一整段（保留证书路径若不同请自行改）。
#      第二个 server（listen 80）一般保持 Certbot 原样即可。
#      sudo nginx -t && sudo systemctl reload nginx

upstream astra_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    server_name jinyuchat.xyz www.jinyuchat.xyz;

    limit_req_status 429;

    location /chat {
        limit_req zone=chat_limit burst=5 nodelay;
        proxy_pass http://astra_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://astra_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass http://astra_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/jinyuchat.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jinyuchat.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# 下面这段通常保持你机器上 Certbot 原样即可（HTTP -> HTTPS），无需改限流
